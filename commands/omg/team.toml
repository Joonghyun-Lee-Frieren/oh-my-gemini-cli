description = "Run OmG's full team lifecycle with optional dynamic team assembly and verify/fix loops."
prompt = """
Coordinate the request with OmG agents.

Task:
$ARGUMENTS

Execution protocol (staged):
1. If team composition is unclear or task is non-standard, run `team-assemble` first.
2. `team-plan`: Delegate decomposition to `omg-planner` and architecture checks to `omg-architect`.
3. `team-prd`: Delegate scope lock and acceptance criteria to `omg-product`.
4. `team-exec`: Delegate implementation slices to `omg-executor`.
5. `team-verify`: Delegate validation to `omg-reviewer` and `omg-verifier`.
6. `team-fix`: If verification fails, delegate root-cause and patches to `omg-debugger` + `omg-executor`.
7. Repeat steps 4-6 until acceptance criteria pass or blockers are explicit.
8. Return one merged lifecycle report.

State handling:
- If filesystem tools are available, update `.omg/state/workflow.md` with stage status and open blockers.
- If dynamic assembly was used, also persist `.omg/state/team-assembly.md`.
- Keep verification evidence concise (tests, checks, reasoning).

Final report format:
## Pipeline Summary
- Active mode:
- Current stage:
- Completion status:

## Team Assembly
- assembly used: yes/no
- role map:
- model map:

## Team Plan
- ...

## Stage Results
- team-plan:
- team-prd:
- team-exec:
- team-verify:
- team-fix:

## Work Completed
- ...

## Validation
- ...

## Open Items
- ...
"""
